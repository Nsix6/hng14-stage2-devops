name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python lint deps
        run: pip install flake8

      - name: Run flake8
        run: flake8 . || true

      - name: Install frontend deps
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Run Hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install Python deps
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run pytest with coverage
        run: |
          export PYTHONPATH=$(pwd)
          pytest --cov=api --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api

      - name: Tag API latest
        run: docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest

      - name: Build worker image
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Tag worker latest
        run: docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest

      - name: Build frontend image
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Tag frontend latest
        run: docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest

      - name: Push images to registry
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image for scan
        run: docker build -t api:latest ./api

      - name: Run Trivy scan (non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:latest
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start services
        run: |
          export REDIS_HOST=redis
          export REDIS_PORT=6379
          export QUEUE_NAME=job
          export API_PORT=8000
          export FRONTEND_PORT=3000
          export API_URL=http://api:8000
          export REDIS_CPU_LIMIT=0.25
          export REDIS_MEMORY_LIMIT=256m
          export API_CPU_LIMIT=0.5
          export API_MEMORY_LIMIT=512m
          export WORKER_CPU_LIMIT=0.5
          export WORKER_MEMORY_LIMIT=512m
          export FRONTEND_CPU_LIMIT=0.5
          export FRONTEND_MEMORY_LIMIT=512m

          docker compose -f docker-compose.yml up -d
          sleep 25

      - name: Run integration test
        run: bash tests/integration.sh

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling deployment
        run: |
          docker compose up -d --no-deps --build api

          for i in {1..12}; do
            if curl -s http://localhost:8000/health | grep ok; then
              echo "New container healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Deployment failed"
          exit 1
