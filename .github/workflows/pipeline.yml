name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python lint
        run: |
          pip install flake8
          flake8 .

      - name: JS lint
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Docker lint
        uses: hadolint/hadolint-action@v2
        with:
          dockerfile: "**/Dockerfile"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install pytest pytest-cov fastapi

      - name: Run tests
        run: |
          pytest --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Tag latest
        run: |
          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest
          docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest
          docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      - name: Scan images
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/api:latest
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/worker:latest
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/frontend:latest

      - name: SARIF output
        run: |
          trivy image --format sarif -o trivy.sarif localhost:5000/api:latest

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose up -d
          sleep 15

      - name: Submit job
        run: |
          JOB=$(curl -s -X POST http://localhost:3000/submit | jq -r .job_id)
          echo "Job: $JOB"
          echo "JOB_ID=$JOB" >> $GITHUB_ENV

      - name: Poll status
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling update
        run: |
          docker compose up -d --no-deps --build api

          for i in {1..12}; do
            if curl -s http://localhost:8000/health | grep ok; then
              echo "New container healthy"
              exit 0
            fi
            sleep 5
          done

          echo "Health check failed — aborting"
          exit 1
