<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Job Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
      }
      #result {
        margin-top: 20px;
        padding: 10px;
        background: #f4f4f4;
        border-radius: 4px;
      }
      #jobs {
        margin-top: 20px;
      }
      .job {
        padding: 8px;
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>Job Processor Dashboard</h1>
    <button onclick="submitJob()">Submit New Job</button>
    <div id="result"></div>
    <div id="jobs"></div>

    <script>
      const jobIds = [];

      async function submitJob() {
        try {
          const res = await fetch("/submit", { method: "POST" });
          const data = await res.json();

          // ✅ FIX: ensure we always read the correct field safely
          const jobId = data.job_id || "ERROR: no job_id returned";

          document.getElementById("result").innerText = `Submitted: ${jobId}`;

          if (data.job_id) {
            jobIds.push(jobId);
            pollJob(jobId);
          }
        } catch (err) {
          document.getElementById("result").innerText = "Error submitting job";
          console.error(err);
        }
      }

      async function pollJob(id) {
        try {
          const res = await fetch(`/status/${id}`);
          const data = await res.json();
          renderJob(id, data.status);

          if (data.status !== "completed") {
            setTimeout(() => pollJob(id), 2000);
          }
        } catch (err) {
          console.error(err);
        }
      }

      function renderJob(id, status) {
        let el = document.getElementById(id);
        if (!el) {
          el = document.createElement("div");
          el.className = "job";
          el.id = id;
          document.getElementById("jobs").appendChild(el);
        }
        el.innerText = `Job ${id.substring(0, 8)}... — ${status}`;
      }
    </script>
  </body>
</html>
